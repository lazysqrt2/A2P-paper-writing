<svg xmlns="http://www.w3.org/2000/svg" width="820" height="440" viewBox="0 0 820 440" role="img" aria-labelledby="title desc">
  <title id="title">ProjectCraft phase-gated workflow</title>
  <desc id="desc">A five-phase workflow from learner intent and source artifacts to a runnable training repository, with learner-work preservation as a cross-cutting constraint.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4b5563"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #111827; }
      .phase { font: 700 15px Arial, Helvetica, sans-serif; fill: #111827; }
      .text { font: 12.5px Arial, Helvetica, sans-serif; fill: #374151; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .box { stroke-width: 1.5; rx: 11; }
      .line { stroke: #4b5563; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="820" height="440" fill="#ffffff"/>
  <text x="410" y="36" text-anchor="middle" class="title">ProjectCraft transforms intent into a runnable practice repository</text>

  <rect x="30" y="82" width="132" height="96" class="box" fill="#eef6ff" stroke="#3b82f6"/>
  <text x="96" y="112" text-anchor="middle" class="phase">Clarify</text>
  <text x="96" y="136" text-anchor="middle" class="text">learner goal</text>
  <text x="96" y="154" text-anchor="middle" class="text">source context</text>

  <rect x="186" y="82" width="132" height="96" class="box" fill="#f8fafc" stroke="#64748b"/>
  <text x="252" y="112" text-anchor="middle" class="phase">Frame</text>
  <text x="252" y="136" text-anchor="middle" class="text">assignment identity</text>
  <text x="252" y="154" text-anchor="middle" class="text">goal and deliverable</text>

  <rect x="342" y="82" width="132" height="96" class="box" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="408" y="112" text-anchor="middle" class="phase">Orchestrate</text>
  <text x="408" y="136" text-anchor="middle" class="text">milestones</text>
  <text x="408" y="154" text-anchor="middle" class="text">roles and ownership</text>

  <rect x="498" y="82" width="132" height="96" class="box" fill="#fff7ed" stroke="#f97316"/>
  <text x="564" y="112" text-anchor="middle" class="phase">Materialize</text>
  <text x="564" y="136" text-anchor="middle" class="text">files and scaffolds</text>
  <text x="564" y="154" text-anchor="middle" class="text">checks and docs</text>

  <rect x="654" y="82" width="132" height="96" class="box" fill="#fdf2f8" stroke="#db2777"/>
  <text x="720" y="112" text-anchor="middle" class="phase">Instantiate</text>
  <text x="720" y="136" text-anchor="middle" class="text">microtasks</text>
  <text x="720" y="154" text-anchor="middle" class="text">role guidance</text>

  <path d="M162 130 L185 130" class="line"/>
  <path d="M318 130 L341 130" class="line"/>
  <path d="M474 130 L497 130" class="line"/>
  <path d="M630 130 L653 130" class="line"/>

  <rect x="72" y="242" width="260" height="98" class="box" fill="#f9fafb" stroke="#9ca3af"/>
  <text x="202" y="272" text-anchor="middle" class="phase">Planning state</text>
  <text x="202" y="296" text-anchor="middle" class="text">learning intent, support strategy,</text>
  <text x="202" y="314" text-anchor="middle" class="text">validation criteria, ownership boundary</text>

  <rect x="488" y="242" width="260" height="98" class="box" fill="#f9fafb" stroke="#9ca3af"/>
  <text x="618" y="272" text-anchor="middle" class="phase">Training repository</text>
  <text x="618" y="296" text-anchor="middle" class="text">starter materials, instructions,</text>
  <text x="618" y="314" text-anchor="middle" class="text">tests, rubrics, intentional gaps</text>

  <path d="M202 179 C210 210, 222 225, 241 242" class="line"/>
  <path d="M408 179 C390 217, 344 242, 332 270" class="line"/>
  <path d="M564 179 C577 209, 593 225, 605 242" class="line"/>
  <path d="M720 179 C709 209, 690 225, 672 242" class="line"/>

  <path d="M332 291 L487 291" class="line"/>
  <rect x="275" y="374" width="270" height="42" rx="21" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4"/>
  <text x="410" y="400" text-anchor="middle" class="small">Cross-phase constraint: preserve meaningful learner work</text>
</svg>
