<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">Practice-assignment design problem</title>
  <desc id="desc">Learner materials and instructor guidance jointly shape a runnable training repository with intentional learner-owned gaps.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { stroke: #1f2937; stroke-width: 2; rx: 16; }
      .soft { stroke: #94a3b8; stroke-width: 1.4; rx: 12; }
      .title { font: 700 21px Arial, Helvetica, sans-serif; fill: #111827; }
      .head { font: 700 15px Arial, Helvetica, sans-serif; fill: #111827; }
      .body { font: 12px Arial, Helvetica, sans-serif; fill: #374151; }
      .tiny { font: 10.5px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 700 11px Arial, Helvetica, sans-serif; fill: #111827; }
      .line { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #334155; stroke-width: 1.35; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; }
      .skin { fill: #ffd6b0; stroke: #334155; stroke-width: 1.3; }
      .hair { fill: #374151; stroke: #334155; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="760" height="520" class="bg"/>
  <text x="380" y="36" text-anchor="middle" class="title">Designing a practice assignment is both engineering and pedagogy</text>

  <rect x="24" y="62" width="210" height="212" class="panel" fill="#eef6ff"/>
  <text x="129" y="90" text-anchor="middle" class="head">Learner Workspace</text>
  <g transform="translate(47 112)">
    <circle cx="32" cy="28" r="17" class="skin"/>
    <path d="M16 27 C18 8, 46 8, 49 28 C42 18, 24 18, 16 27Z" class="hair"/>
    <path d="M16 72 C22 46, 45 46, 51 72Z" fill="#6ec9d8" stroke="#334155" stroke-width="1.4"/>
    <path d="M8 56 L21 45 M56 56 L44 45" class="thin"/>
    <circle cx="26" cy="29" r="1.8" fill="#111827"/>
    <circle cx="38" cy="29" r="1.8" fill="#111827"/>
    <path d="M27 38 C31 42, 36 42, 40 38" class="thin"/>
  </g>
  <g transform="translate(112 114)">
    <rect x="0" y="0" width="84" height="58" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.4"/>
    <rect x="0" y="0" width="84" height="15" rx="7" fill="#bfdbfe"/>
    <text x="42" y="35" text-anchor="middle" class="label">starter.py</text>
    <path d="M14 44 H69" class="thin"/>
  </g>
  <g transform="translate(54 195)">
    <rect x="0" y="0" width="150" height="48" rx="9" fill="#ffffff" stroke="#60a5fa" stroke-width="1.3"/>
    <circle cx="18" cy="17" r="4" fill="#2563eb"/>
    <text x="31" y="21" class="tiny">tasks + deliverables</text>
    <circle cx="18" cy="34" r="4" fill="#2563eb"/>
    <text x="31" y="38" class="tiny">tests + resources</text>
  </g>

  <rect x="526" y="62" width="210" height="212" class="panel" fill="#fff7ed"/>
  <text x="631" y="90" text-anchor="middle" class="head">Instructor Guide</text>
  <g transform="translate(557 111)">
    <circle cx="32" cy="28" r="17" class="skin"/>
    <path d="M16 30 C18 11, 46 8, 50 30 C40 21, 26 21, 16 30Z" class="hair"/>
    <rect x="18" y="44" width="30" height="31" rx="8" fill="#f6ad55" stroke="#334155" stroke-width="1.4"/>
    <path d="M5 61 L21 48 M59 61 L45 48" class="thin"/>
    <circle cx="26" cy="29" r="1.8" fill="#111827"/>
    <circle cx="38" cy="29" r="1.8" fill="#111827"/>
    <path d="M27 38 C31 41, 36 41, 40 38" class="thin"/>
  </g>
  <g transform="translate(622 112)">
    <rect x="0" y="0" width="78" height="62" rx="7" fill="#ffffff" stroke="#f97316" stroke-width="1.4"/>
    <path d="M13 18 H65 M13 32 H65 M13 46 H48" class="thin"/>
    <path d="M8 17 L11 20 L17 12 M8 31 L11 34 L17 26" stroke="#16a34a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <text x="39" y="58" text-anchor="middle" class="tiny">rubric</text>
  </g>
  <g transform="translate(554 195)">
    <rect x="0" y="0" width="150" height="48" rx="9" fill="#ffffff" stroke="#fb923c" stroke-width="1.3"/>
    <circle cx="18" cy="17" r="4" fill="#ea580c"/>
    <text x="31" y="21" class="tiny">objectives + scaffolds</text>
    <circle cx="18" cy="34" r="4" fill="#ea580c"/>
    <text x="31" y="38" class="tiny">feedback checkpoints</text>
  </g>

  <rect x="267" y="82" width="226" height="82" class="soft" fill="#ffffff"/>
  <text x="380" y="110" text-anchor="middle" class="head">Assignment Design</text>
  <text x="380" y="132" text-anchor="middle" class="body">choose what to build,</text>
  <text x="380" y="149" text-anchor="middle" class="body">scaffold, and leave open</text>
  <path d="M234 152 C250 130, 252 120, 267 120" class="line"/>
  <path d="M526 152 C510 130, 508 120, 493 120" class="line"/>

  <rect x="172" y="316" width="416" height="150" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.2"/>
  <text x="380" y="344" text-anchor="middle" class="head">Runnable Training Repository</text>
  <g transform="translate(201 363)">
    <rect x="0" y="0" width="78" height="68" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.3"/>
    <rect x="0" y="0" width="78" height="17" rx="8" fill="#dbeafe"/>
    <path d="M11 31 H58 M11 45 H67 M11 58 H48" class="thin"/>
    <text x="39" y="86" text-anchor="middle" class="tiny">files</text>
  </g>
  <g transform="translate(342 363)">
    <rect x="0" y="0" width="78" height="68" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.3"/>
    <circle cx="22" cy="28" r="6" fill="#f97316" stroke="#334155" stroke-width="1"/>
    <path d="M38 27 H62 M18 45 H62" class="thin"/>
    <text x="39" y="86" text-anchor="middle" class="tiny">guidance</text>
  </g>
  <g transform="translate(481 363)">
    <rect x="0" y="0" width="78" height="68" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.3"/>
    <path d="M17 22 H61 M17 38 H61 M17 54 H45" class="thin"/>
    <path d="M52 50 L65 63" stroke="#ef4444" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M65 50 L52 63" stroke="#ef4444" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <text x="39" y="86" text-anchor="middle" class="tiny">open gaps</text>
  </g>
  <path d="M380 164 C380 220, 380 260, 380 315" class="line"/>
  <path d="M246 274 C255 298, 282 313, 321 321" class="dash"/>
  <path d="M514 274 C505 298, 478 313, 439 321" class="dash"/>

  <rect x="250" y="477" width="260" height="28" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="380" y="496" text-anchor="middle" class="label">complete enough to run; incomplete where learning happens</text>
</svg>
