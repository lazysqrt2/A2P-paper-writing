<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" role="img" aria-labelledby="title desc">
  <title id="title">Coordinated practice-assignment design</title>
  <desc id="desc">A diagram showing learner-facing materials and instructor-facing guidance jointly producing an aligned practice assignment with preserved learner work.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4a5568"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .label { font: 700 17px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .text { font: 14px Arial, Helvetica, sans-serif; fill: #374151; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .box { stroke-width: 1.6; rx: 12; }
      .line { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #9ca3af; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect x="0" y="0" width="720" height="430" fill="#ffffff"/>
  <text x="360" y="38" text-anchor="middle" class="title">Practice assignments require coordinated design</text>

  <rect x="38" y="83" width="255" height="196" class="box" fill="#eef6ff" stroke="#3b82f6"/>
  <text x="165.5" y="116" text-anchor="middle" class="label">Learner materials</text>
  <circle cx="69" cy="147" r="5" fill="#2563eb"/>
  <text x="86" y="152" class="text">starter files and workspace</text>
  <circle cx="69" cy="178" r="5" fill="#2563eb"/>
  <text x="86" y="183" class="text">task instructions</text>
  <circle cx="69" cy="209" r="5" fill="#2563eb"/>
  <text x="86" y="214" class="text">requirements and examples</text>
  <circle cx="69" cy="240" r="5" fill="#2563eb"/>
  <text x="86" y="245" class="text">deliverables and checks</text>

  <rect x="427" y="83" width="255" height="196" class="box" fill="#fff7ed" stroke="#f97316"/>
  <text x="554.5" y="116" text-anchor="middle" class="label">Instructor guidance</text>
  <circle cx="458" cy="147" r="5" fill="#ea580c"/>
  <text x="475" y="152" class="text">learning objectives</text>
  <circle cx="458" cy="178" r="5" fill="#ea580c"/>
  <text x="475" y="183" class="text">scaffolding strategy</text>
  <circle cx="458" cy="209" r="5" fill="#ea580c"/>
  <text x="475" y="214" class="text">checkpoints and feedback</text>
  <circle cx="458" cy="240" r="5" fill="#ea580c"/>
  <text x="475" y="245" class="text">rubrics and evaluation</text>

  <rect x="247" y="315" width="226" height="76" class="box" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="360" y="347" text-anchor="middle" class="label">Aligned assignment</text>
  <text x="360" y="371" text-anchor="middle" class="small">runnable context with meaningful</text>
  <text x="360" y="388" text-anchor="middle" class="small">learner-owned work left open</text>

  <path d="M166 280 C190 315, 226 343, 247 353" class="line"/>
  <path d="M554 280 C530 315, 494 343, 473 353" class="line"/>
  <path d="M293 181 C332 157, 388 157, 427 181" class="muted-line"/>
  <path d="M427 190 C388 214, 332 214, 293 190" class="muted-line"/>
  <text x="360" y="154" text-anchor="middle" class="small">co-design constraint</text>
</svg>
